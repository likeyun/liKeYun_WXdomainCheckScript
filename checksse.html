<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>SSE 批量检测</title>

<style>
body{
    background:#0f172a;
    color:#fff;
    font-family:Arial;
    padding:20px;
}

textarea{
    width:100%;
    height:160px;
    border-radius:8px;
    padding:10px;
}

button{
    margin-top:10px;
    padding:10px 16px;
    background:#1677ff;
    color:#fff;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

#log{
    margin-top:20px;
    background:#111827;
    padding:10px;
    height:300px;
    overflow:auto;
    border-radius:8px;
    font-size:13px;
}

.item{
    padding:6px;
    border-bottom:1px solid #1f2937;
}
.ok{ color:#22c55e; }
.bad{ color:#ef4444; }
</style>
</head>

<body>

<h2>SSE 实时检测</h2>

<textarea id="input" placeholder="一行一个URL"></textarea>

<br>
<button onclick="start()">开始</button>

<div id="log"></div>

<script>
function start(){
    const text = document.getElementById("input").value;

    const urls = text
        .split("\n")
        .map(v => v.trim())
        .filter(v => v);

    if(urls.length === 0){
        alert("请输入URL");
        return;
    }

    const log = document.getElementById("log");
    log.innerHTML = "";

    const url = "http://127.0.0.1:8000?url=" + encodeURIComponent(urls.join(","));

    const es = new EventSource(url);

    es.onmessage = function(e){
        const data = JSON.parse(e.data);

        if(data.msg === "done"){
            es.close();
            return;
        }

        const div = document.createElement("div");
        div.className = "item";

        const ok = data.code === 0;

        div.innerHTML = `
            <div class="${ok ? 'ok' : 'bad'}">
                ${ok ? "✔ 正常" : "✖ 拦截"}
            </div>
            <div>${data.url || ""}</div>
            <div>${data.ret?.title || ""}</div>
        `;

        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    };

    es.onerror = function(){
        console.log("连接错误");
        es.close();
    };
}
</script>

</body>
</html>
